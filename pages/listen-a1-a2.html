<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Practica listening IELTS basico (A1-A2) con clips reales de peliculas y series. Escucha frases naturales y mejora tu comprension auditiva.">
  <title>Listening Basico A1-A2 - VisaWork Peru</title>
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    :root { --accent: #8b5cf6; --green: #10b981; --red: #ef4444; --blue: #3b82f6; --purple: #8b5cf6; }
    body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; }

    .page-hero {
      background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
      color: white; padding: 100px 24px 48px; text-align: center;
    }
    .page-hero h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 8px; }
    .page-hero p { font-size: 1.05rem; opacity: 0.9; max-width: 600px; margin: 0 auto; }

    .mode-tabs { display: flex; gap: 8px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
    .mode-tab {
      padding: 10px 20px; border-radius: 50px; border: 2px solid rgba(255,255,255,.3);
      background: transparent; color: white; font-weight: 600; font-size: 0.88rem;
      cursor: pointer; transition: all 0.2s;
    }
    .mode-tab:hover { background: rgba(255,255,255,.15); }
    .mode-tab.active { background: white; color: #7c3aed; border-color: white; }

    .stats-bar { display: flex; gap: 16px; justify-content: center; padding: 16px 24px; flex-wrap: wrap; }
    .stat-pill {
      padding: 8px 16px; background: white; border-radius: 50px; font-size: 0.82rem;
      font-weight: 600; color: #64748b; box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .stat-pill strong { color: #0f172a; }

    .categories { max-width: 900px; margin: 0 auto; padding: 32px 24px; }
    .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .cat-card {
      background: white; border-radius: 16px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08);
      border: 2px solid #e2e8f0; cursor: pointer; transition: all 0.25s;
    }
    .cat-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,.1); }
    .cat-card .cat-icon { font-size: 2rem; margin-bottom: 8px; }
    .cat-card h3 { font-size: 1rem; font-weight: 700; color: #0f172a; margin-bottom: 4px; }
    .cat-card p { font-size: 0.82rem; color: #64748b; }
    .cat-card .cat-count { font-size: 0.75rem; font-weight: 700; color: var(--green); margin-top: 8px; }

    .practice-container { max-width: 700px; margin: 0 auto; padding: 32px 24px; display: none; }
    .practice-container.active { display: block; }
    .practice-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .practice-header h3 { font-size: 1.1rem; font-weight: 700; }

    .progress-bar { height: 8px; background: #e2e8f0; border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #7c3aed); border-radius: 10px; transition: width 0.4s; }
    .progress-text { font-size: 0.82rem; font-weight: 700; color: #64748b; text-align: right; margin-bottom: 8px; }

    .video-card {
      background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 15px rgba(0,0,0,.08);
      border: 2px solid #e2e8f0; margin-bottom: 20px;
    }
    .video-card h4 { font-size: 1.1rem; font-weight: 700; color: #0f172a; margin-bottom: 16px; }

    .video-wrapper {
      position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;
      border-radius: 12px; margin-bottom: 16px; background: #1e293b;
    }
    .video-wrapper iframe {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      border: none; border-radius: 12px;
    }

    .phrase-display {
      text-align: center; padding: 20px; background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      border-radius: 12px; margin-bottom: 16px;
    }
    .phrase-english { font-size: 1.8rem; font-weight: 900; color: #0f172a; margin-bottom: 4px; }
    .phrase-spanish { font-size: 1rem; color: #64748b; }
    .phrase-phonetic { font-size: 0.85rem; color: var(--accent); font-style: italic; margin-top: 4px; }
    .phrase-movie { font-size: 0.82rem; color: var(--purple); font-weight: 600; margin-top: 8px; }

    .listen-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px; border: 2px solid var(--accent); border-radius: 12px;
      background: white; color: var(--accent); font-weight: 700; font-size: 1rem;
      cursor: pointer; transition: all 0.2s; margin-bottom: 16px;
    }
    .listen-btn:hover { background: var(--accent); color: white; }

    .quiz-options { display: grid; gap: 10px; }
    .quiz-option {
      padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 12px;
      cursor: pointer; transition: all 0.2s; font-size: 0.95rem; display: flex; align-items: center; gap: 12px;
    }
    .quiz-option:hover { border-color: var(--accent); background: #f5f3ff; }
    .quiz-option.correct { border-color: var(--green); background: #f0fdf4; color: #059669; }
    .quiz-option.wrong { border-color: var(--red); background: #fef2f2; color: var(--red); }
    .quiz-option .q-letter {
      width: 28px; height: 28px; border-radius: 8px; background: #f1f5f9;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.82rem; color: #64748b; flex-shrink: 0;
    }
    .quiz-option.correct .q-letter { background: var(--green); color: white; }
    .quiz-option.wrong .q-letter { background: var(--red); color: white; }

    .result-card {
      text-align: center; padding: 40px; background: white; border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,.1);
    }
    .result-card .score-num { font-size: 3rem; font-weight: 900; color: var(--green); }
    .result-card .score-label { font-size: 1.1rem; font-weight: 600; color: #64748b; margin-top: 8px; }

    .back-link { display: inline-flex; align-items: center; gap: 6px; color: #64748b; font-weight: 600; text-decoration: none; font-size: 0.9rem; }
    .back-link:hover { color: #0f172a; }

    @media (max-width: 600px) {
      .page-hero h1 { font-size: 1.8rem; }
      .cat-grid { grid-template-columns: 1fr 1fr; }
      .phrase-english { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<div class="page-hero">
  <a href="ielts-simulador.html" class="back-link" style="position:absolute; top:80px; left:24px; color:rgba(255,255,255,.8);">← Volver al Simulador</a>
  <a href="/pages/ielts-completa-v2.html" style="text-decoration:none;display:inline-flex;align-items:center;gap:10px;margin-bottom:8px;">
<svg width="40" height="40" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
<defs><linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#0b2942"/><stop offset="100%" stop-color="#164066"/>
</linearGradient></defs>
<rect width="64" height="64" rx="14" fill="url(#pg)"/>
<text x="32" y="46" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="38" font-weight="bold" fill="#d4a017">P</text>
</svg>
<span style="color:#fff;font-size:1.1em;font-weight:700;letter-spacing:1px;">PinPon</span>
</a>
<h1>🎧 Listening Basico</h1>
  <p>Nivel A1-A2: Escucha frases reales de peliculas y series en YouTube</p>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="showMode('categories')">📂 Categorias</button>
    <button class="mode-tab" onclick="showMode('practice')">🎯 Practica</button>
    <button class="mode-tab" onclick="showMode('quiz')">❓ Quiz</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-pill">🎧 <strong id="statListened">0</strong> escuchadas</div>
  <div class="stat-pill">✅ <strong id="statCorrect">0</strong> correctas</div>
  <div class="stat-pill">📊 <strong id="statTotal">0</strong> total</div>
</div>

<!-- CATEGORIES -->
<div class="categories" id="categoriesSection">
  <h2 style="text-align:center; font-size:1.5rem; font-weight:800; margin-bottom:24px;">Elige una categoria para practicar listening</h2>
  <div class="cat-grid" id="catGrid"></div>
</div>

<!-- PRACTICE -->
<div class="practice-container" id="practiceSection">
  <div class="practice-header">
    <button class="back-link" onclick="showMode('categories')">← Categorias</button>
    <h3 id="practiceTitle"></h3>
  </div>
  <div class="progress-text" id="practiceProgressText">0/0</div>
  <div class="progress-bar"><div class="progress-fill" id="practiceProgressFill" style="width:0%;"></div></div>
  <div id="practiceContent"></div>
</div>

<!-- QUIZ -->
<div class="practice-container" id="quizSection">
  <div class="practice-header">
    <button class="back-link" onclick="showMode('categories')">← Categorias</button>
    <h3 id="quizTitle"></h3>
  </div>
  <div class="progress-text" id="quizProgressText">0/0</div>
  <div class="progress-bar"><div class="progress-fill" id="quizProgressFill" style="width:0%;"></div></div>
  <div id="quizContent"></div>
</div>

<script>
// ==========================================
// LISTENING DATA - REAL MOVIE/SERIES CLIPS
// Each clip is from a real movie or TV series
// ==========================================
const listenCategories = [
  {
    id: 'movie-phrases',
    icon: '🎬',
    name: 'Frases de Peliculas',
    desc: 'Dialogos reales de cine y series',
    phrases: [
      { en: "I need your help.", es: 'Necesito tu ayuda.', phonetic: '/aɪ niːd jɔːr hɛlp/', videoId: 'FBjIMmv8L-E', start: 8, end: 12, hint: 'Run All Night (2015)', movie: '🎬 Run All Night' },
    ]
  }
];

// ==========================================
// STATE
// ==========================================
let currentMode = 'categories';
let currentCat = null;
let practiceIdx = 0;
let practiceCorrect = 0;
let quizIdx = 0;
let quizCorrect = 0;
let quizQuestions = [];
let listenedPhrases = JSON.parse(localStorage.getItem('listeningListened2026') || '{}');
let quizStats = JSON.parse(localStorage.getItem('listeningQuizStats2026') || '{"correct":0,"attempted":0}');

function saveState() {
  localStorage.setItem('listeningListened2026', JSON.stringify(listenedPhrases));
  localStorage.setItem('listeningQuizStats2026', JSON.stringify(quizStats));
}

// ==========================================
// MODE SWITCHING
// ==========================================
function showMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.mode-tab').forEach(t => {
    if (mode === 'categories' && t.textContent.includes('Categor')) t.classList.add('active');
    if (mode === 'practice' && t.textContent.includes('Practica')) t.classList.add('active');
    if (mode === 'quiz' && t.textContent.includes('Quiz')) t.classList.add('active');
  });

  document.getElementById('categoriesSection').style.display = mode === 'categories' ? '' : 'none';
  document.getElementById('practiceSection').classList.toggle('active', mode === 'practice' && currentCat);
  document.getElementById('quizSection').classList.toggle('active', mode === 'quiz' && currentCat);

  if (mode === 'categories') renderCategories();
  if (mode === 'practice' && currentCat) renderPractice();
  if (mode === 'quiz' && currentCat) startQuiz();
  updateStats();
}

function showCategories() {
  currentCat = null;
  showMode('categories');
}

// ==========================================
// CATEGORIES
// ==========================================
function renderCategories() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = listenCategories.map(cat => {
    const total = cat.phrases.length;
    const listened = cat.phrases.filter(p => listenedPhrases[p.en]).length;
    const pct = Math.round((listened / total) * 100);
    return `<div class="cat-card" onclick="selectCategory('${cat.id}')">
      <div class="cat-icon">${cat.icon}</div>
      <h3>${cat.name}</h3>
      <p>${cat.desc}</p>
      <div style="margin-top:8px;">
        <div style="display:flex; justify-content:space-between; font-size:0.75rem; margin-bottom:4px;">
          <span style="color:#64748b;">${listened}/${total}</span>
          <span style="font-weight:700; color:var(--green);">${pct}%</span>
        </div>
        <div style="height:6px; background:#e2e8f0; border-radius:10px; overflow:hidden;">
          <div style="height:100%; width:${pct}%; background:linear-gradient(90deg, var(--green), #059669); border-radius:10px; transition:width 0.4s;"></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function selectCategory(catId) {
  currentCat = listenCategories.find(c => c.id === catId);
  practiceIdx = 0; practiceCorrect = 0;
  showMode('practice');
}

// ==========================================
// PRACTICE (Watch & Listen)
// ==========================================
function renderPractice() {
  if (!currentCat || practiceIdx >= currentCat.phrases.length) { finishPractice(); return; }
  const p = currentCat.phrases[practiceIdx];

  document.getElementById('practiceTitle').textContent = currentCat.icon + ' ' + currentCat.name;
  document.getElementById('practiceProgressText').textContent = (practiceIdx + 1) + '/' + currentCat.phrases.length;
  document.getElementById('practiceProgressFill').style.width = ((practiceIdx / currentCat.phrases.length) * 100) + '%';

  const embedUrl = `https://www.youtube.com/embed/${p.videoId}?start=${p.start}&end=${p.end}&autoplay=1&rel=0&modestbranding=1`;

  document.getElementById('practiceContent').innerHTML = `
    <div class="video-card">
      <h4>🎧 Escucha la frase (${p.end - p.start} segundos)</h4>

      <div class="video-wrapper">
        <iframe src="${embedUrl}" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      </div>

      <button class="listen-btn" onclick="replayVideo(this)" data-url="${embedUrl.replace('autoplay=1', 'autoplay=1')}">
        🔄 Repetir clip
      </button>

      <div class="phrase-display">
        <div class="phrase-english" id="phraseText" style="filter: blur(8px); cursor: pointer;" onclick="revealPhrase()">${p.en}</div>
        <div class="phrase-spanish" id="phraseTranslation" style="filter: blur(8px); cursor: pointer;" onclick="revealPhrase()">${p.es}</div>
        <div class="phrase-phonetic">${p.phonetic}</div>
        <div class="phrase-movie">${p.movie}</div>
        <p style="font-size:0.82rem; color:var(--accent); margin-top:8px;">💡 Toca la frase para revelar la respuesta</p>
      </div>

      <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
        <button class="listen-btn" style="width:auto; padding:12px 24px;" onclick="markListened(true)">✅ La escuche</button>
        <button class="listen-btn" style="width:auto; padding:12px 24px; border-color:var(--red); color:var(--red);" onclick="markListened(false)">❌ No la escuche</button>
      </div>
    </div>`;
}

function replayVideo(btn) {
  const url = btn.dataset.url;
  const wrapper = btn.previousElementSibling;
  wrapper.innerHTML = `<iframe src="${url}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
}

function revealPhrase() {
  document.getElementById('phraseText').style.filter = 'none';
  document.getElementById('phraseTranslation').style.filter = 'none';
}

function markListened(heard) {
  const p = currentCat.phrases[practiceIdx];
  if (heard) {
    listenedPhrases[p.en] = true;
    practiceCorrect++;
  } else {
    delete listenedPhrases[p.en];
  }
  saveState();
  practiceIdx++;
  renderPractice();
  updateStats();
}

function finishPractice() {
  const total = currentCat.phrases.length;
  const pct = Math.round((practiceCorrect / total) * 100);
  document.getElementById('practiceContent').innerHTML = `
    <div class="result-card">
      <div style="font-size:3rem; margin-bottom:16px;">${pct >= 70 ? '🎉' : '💪'}</div>
      <div class="score-num">${practiceCorrect}/${total}</div>
      <div class="score-label">frases escuchadas (${pct}%)</div>
      <p style="margin-top:16px; color:#64748b;">${pct >= 70 ? '¡Excelente! Tu listening esta mejorando.' : '¡Sigue practicando! Escucha mas veces.'}</p>
      <div style="display:flex; gap:12px; justify-content:center; margin-top:24px; flex-wrap:wrap;">
        <button class="listen-btn" style="width:auto; padding:12px 24px; background:var(--accent); color:white;" onclick="selectCategory('${currentCat.id}')">🔄 Repetir</button>
      </div>
    </div>`;
}

// ==========================================
// QUIZ
// ==========================================
function startQuiz() {
  if (!currentCat) return;
  quizIdx = 0; quizCorrect = 0;

  const phrases = [...currentCat.phrases];
  quizQuestions = phrases.map(p => {
    const others = listenCategories.flatMap(c => c.phrases).filter(x => x.en !== p.en);
    const wrong = shuffle(others).slice(0, 3).map(x => x.en);
    return { phrase: p, options: shuffle([p.en, ...wrong]), answer: p.en };
  });
  quizQuestions = shuffle(quizQuestions).slice(0, 8);

  document.getElementById('quizTitle').textContent = currentCat.icon + ' Quiz: ' + currentCat.name;
  showQuizQuestion();
}

function showQuizQuestion() {
  if (quizIdx >= quizQuestions.length) { finishQuiz(); return; }
  const q = quizQuestions[quizIdx];
  const p = q.phrase;
  const embedUrl = `https://www.youtube.com/embed/${p.videoId}?start=${p.start}&end=${p.end}&autoplay=1&rel=0&modestbranding=1`;

  document.getElementById('quizProgressFill').style.width = ((quizIdx / quizQuestions.length) * 100) + '%';
  document.getElementById('quizProgressText').textContent = (quizIdx + 1) + '/' + quizQuestions.length;

  const letters = ['A','B','C','D'];
  document.getElementById('quizContent').innerHTML = `
    <div class="video-card">
      <h4>🎧 Que frase escuchaste?</h4>
      <div class="video-wrapper">
        <iframe src="${embedUrl}" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      </div>
      <button class="listen-btn" onclick="replayQuizVideo(this)" data-url="${embedUrl}">
        🔄 Repetir clip
      </button>
      <div class="quiz-options" style="margin-top:16px;">
        ${q.options.map((opt, i) => `<div class="quiz-option" onclick="answerQuiz(this, '${esc(opt)}', '${esc(q.answer)}')"><div class="q-letter">${letters[i]}</div><span>${opt}</span></div>`).join('')}
      </div>
    </div>`;
}

function replayQuizVideo(btn) {
  const url = btn.dataset.url;
  const wrapper = btn.previousElementSibling;
  wrapper.innerHTML = `<iframe src="${url}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
}

function answerQuiz(el, selected, correct) {
  if (el.parentElement.querySelector('.correct, .wrong')) return;
  el.parentElement.querySelectorAll('.quiz-option').forEach(o => {
    if (o.querySelector('span').textContent === correct) o.classList.add('correct');
    else if (o === el && selected !== correct) o.classList.add('wrong');
  });
  if (selected === correct) {
    quizCorrect++;
    quizStats.correct++;
  }
  quizStats.attempted++;
  saveState();
  updateStats();
  setTimeout(() => { quizIdx++; showQuizQuestion(); }, 1200);
}

function finishQuiz() {
  const pct = Math.round((quizCorrect / quizQuestions.length) * 100);
  document.getElementById('quizContent').innerHTML = `
    <div class="result-card">
      <div style="font-size:3rem; margin-bottom:16px;">${pct >= 80 ? '🏆' : pct >= 60 ? '🎉' : '📚'}</div>
      <div class="score-num">${quizCorrect}/${quizQuestions.length}</div>
      <div class="score-label">respuestas correctas (${pct}%)</div>
      <p style="margin-top:16px; color:#64748b;">${pct >= 80 ? '¡Dominas el listening!' : pct >= 60 ? '¡Muy bien!' : 'Sigue practicando.'}</p>
      <div style="display:flex; gap:12px; justify-content:center; margin-top:24px; flex-wrap:wrap;">
        <button class="listen-btn" style="width:auto; padding:12px 24px; background:var(--accent); color:white;" onclick="startQuiz(); showMode('quiz');">🔄 Repetir Quiz</button>
      </div>
    </div>`;
}

// ==========================================
// UTILS
// ==========================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

function esc(s) { return s.replace(/'/g, "\\'").replace(/"/g, '\\"'); }

function markAsComplete() {
  const progress = JSON.parse(localStorage.getItem('ieltsProgress2026') || '{"1":{},"2":{},"3":{}}');
  if (!progress['1']) progress['1'] = {};
  progress['1']['listen'] = true;
  localStorage.setItem('ieltsProgress2026', JSON.stringify(progress));
  const btn = document.getElementById('completeBtn');
  btn.textContent = '✅ ¡Completado! Redirigiendo...';
  btn.style.background = '#059669';
  btn.disabled = true;
  setTimeout(() => { window.location.href = 'ielts-simulador.html'; }, 1200);
}

function updateStats() {
  const totalPhrases = listenCategories.flatMap(c => c.phrases).length;
  const listened = Object.keys(listenedPhrases).length;
  document.getElementById('statListened').textContent = listened;
  document.getElementById('statCorrect').textContent = quizStats.correct;
  document.getElementById('statTotal').textContent = totalPhrases;
}

// ==========================================
// INIT
// ==========================================
document.addEventListener('DOMContentLoaded', () => {
  renderCategories();
  updateStats();
  showMode('categories');
});
</script>

<!-- MARCAR COMO COMPLETADO -->
<div style="text-align:center; padding:24px;">
  <button id="completeBtn" onclick="markAsComplete()" style="padding:14px 32px; font-size:1rem; font-weight:700; background:var(--green); color:white; border:none; border-radius:12px; cursor:pointer; transition:all 0.2s;">
    ✅ Marcar Listening como Completado
  </button>
  <p style="font-size:0.82rem; color:#64748b; margin-top:8px;">Al hacer click, se sincronizara con tu progreso en el simulador</p>
</div>

</body>
</html>
